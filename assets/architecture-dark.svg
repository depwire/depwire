<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Depwire architecture diagram — dark version</title>
<desc>Three-layer diagram showing AI tools at top, Depwire in the middle, and your codebase at bottom, with bidirectional data flows</desc>

<defs>
  <marker id="arrow-solid" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3A7BFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="540" fill="#0B1E2D"/>

<!-- Layer labels (left side) -->
<text x="36" y="88" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">AI tools</text>
<text x="36" y="258" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Depwire</text>
<text x="36" y="430" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Codebase</text>

<!-- ── TOP LAYER: AI tools ── -->

<!-- Claude Code -->
<rect x="68" y="52" width="130" height="72" rx="8" fill="#112233" stroke="#3A7BFF" stroke-width="0.8"/>
<text x="133" y="82" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Claude Code</text>
<text x="133" y="102" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Agentic coding</text>

<!-- Cursor -->
<rect x="218" y="52" width="130" height="72" rx="8" fill="#112233" stroke="#3A7BFF" stroke-width="0.8"/>
<text x="283" y="82" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Cursor</text>
<text x="283" y="102" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">IDE assistant</text>

<!-- Aider -->
<rect x="368" y="52" width="130" height="72" rx="8" fill="#112233" stroke="#3A7BFF" stroke-width="0.8"/>
<text x="433" y="82" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Aider</text>
<text x="433" y="102" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Terminal coding</text>

<!-- Any MCP tool -->
<rect x="518" y="52" width="130" height="72" rx="8" fill="#112233" stroke="#3A7BFF" stroke-width="0.8" stroke-dasharray="4 3"/>
<text x="583" y="82" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Any MCP tool</text>
<text x="583" y="102" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Pluggable</text>

<!-- Arrows: AI tools → Depwire -->
<line x1="133" y1="124" x2="133" y2="158" stroke="#3A7BFF" stroke-width="1.2" fill="none" marker-end="url(#arrow-dashed)"/>
<line x1="283" y1="124" x2="283" y2="158" stroke="#3A7BFF" stroke-width="1.2" fill="none" marker-end="url(#arrow-dashed)"/>
<line x1="433" y1="124" x2="433" y2="158" stroke="#3A7BFF" stroke-width="1.2" fill="none" marker-end="url(#arrow-dashed)"/>
<line x1="583" y1="124" x2="583" y2="158" stroke="#3A7BFF" stroke-width="1.2" fill="none" marker-end="url(#arrow-dashed)" stroke-dasharray="4 3" opacity="0.6"/>

<!-- Arrows: Depwire → AI tools (return) -->
<line x1="149" y1="158" x2="149" y2="124" stroke="#00E5FF" stroke-width="0.8" fill="none" marker-end="url(#arrow-solid)" stroke-dasharray="4 3" opacity="0.7"/>
<line x1="299" y1="158" x2="299" y2="124" stroke="#00E5FF" stroke-width="0.8" fill="none" marker-end="url(#arrow-solid)" stroke-dasharray="4 3" opacity="0.7"/>
<line x1="449" y1="158" x2="449" y2="124" stroke="#00E5FF" stroke-width="0.8" fill="none" marker-end="url(#arrow-solid)" stroke-dasharray="4 3" opacity="0.7"/>

<!-- ── MIDDLE LAYER: Depwire ── -->
<rect x="68" y="158" width="580" height="200" rx="12" fill="#0D2438" stroke="#00E5FF" stroke-width="1"/>

<!-- Depwire label inside -->
<text x="178" y="178" text-anchor="middle" dominant-baseline="central" style="fill:#00E5FF;font-family:-apple-system,system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:1px">DEPWIRE</text>

<!-- What If box -->
<rect x="88" y="192" width="120" height="76" rx="6" fill="#0B2A3D" stroke="#3A7BFF" stroke-width="0.8"/>
<text x="148" y="222" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:central">What If</text>
<text x="148" y="242" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">Simulation</text>
<text x="148" y="257" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">engine</text>

<!-- Security box -->
<rect x="228" y="192" width="120" height="76" rx="6" fill="#0B2A3D" stroke="#3A7BFF" stroke-width="0.8"/>
<text x="288" y="222" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:central">Security</text>
<text x="288" y="242" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">Scanner</text>
<text x="288" y="257" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">graph-aware</text>

<!-- Health box -->
<rect x="368" y="192" width="120" height="76" rx="6" fill="#0B2A3D" stroke="#3A7BFF" stroke-width="0.8"/>
<text x="428" y="222" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:central">Health</text>
<text x="428" y="242" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">Score</text>
<text x="428" y="257" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">0 – 100</text>

<!-- Context box -->
<rect x="508" y="192" width="120" height="76" rx="6" fill="#0A2E20" stroke="#00E5FF" stroke-width="1"/>
<text x="568" y="215" text-anchor="middle" dominant-baseline="central" style="fill:#00E5FF;font-family:-apple-system,system-ui,sans-serif;font-size:13px;font-weight:600;text-anchor:middle;dominant-baseline:central">Context</text>
<text x="568" y="235" text-anchor="middle" dominant-baseline="central" style="fill:#4DD9B0;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">Local · private</text>
<text x="568" y="250" text-anchor="middle" dominant-baseline="central" style="fill:#4DD9B0;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">zero tokens</text>
<text x="568" y="265" text-anchor="middle" dominant-baseline="central" style="fill:#4DD9B0;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">consumed</text>

<!-- MCP tools label -->
<text x="358" y="302" text-anchor="middle" dominant-baseline="central" style="fill:#3A7BFF;font-family:-apple-system,system-ui,sans-serif;font-size:11px;font-weight:500;text-anchor:middle;dominant-baseline:central">17 MCP tools  ·  tree-sitter AST  ·  deterministic graph</text>

<!-- Arrows: Depwire → Codebase -->
<line x1="200" y1="358" x2="200" y2="392" stroke="#00E5FF" stroke-width="1.2" fill="none" marker-end="url(#arrow-solid)"/>
<line x1="358" y1="358" x2="358" y2="392" stroke="#00E5FF" stroke-width="1.2" fill="none" marker-end="url(#arrow-solid)"/>
<line x1="516" y1="358" x2="516" y2="392" stroke="#00E5FF" stroke-width="1.2" fill="none" marker-end="url(#arrow-solid)"/>

<!-- Arrows: Codebase → Depwire (return) -->
<line x1="216" y1="392" x2="216" y2="358" stroke="#3A7BFF" stroke-width="0.8" fill="none" marker-end="url(#arrow-dashed)" stroke-dasharray="4 3" opacity="0.7"/>
<line x1="374" y1="392" x2="374" y2="358" stroke="#3A7BFF" stroke-width="0.8" fill="none" marker-end="url(#arrow-dashed)" stroke-dasharray="4 3" opacity="0.7"/>
<line x1="532" y1="392" x2="532" y2="358" stroke="#3A7BFF" stroke-width="0.8" fill="none" marker-end="url(#arrow-dashed)" stroke-dasharray="4 3" opacity="0.7"/>

<!-- ── BOTTOM LAYER: Codebase ── -->
<rect x="68" y="392" width="580" height="72" rx="12" fill="#112233" stroke="#3A7BFF" stroke-width="0.8"/>
<text x="358" y="418" text-anchor="middle" dominant-baseline="central" style="fill:#E8F4FF;font-family:-apple-system,system-ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Your codebase</text>
<text x="358" y="443" text-anchor="middle" dominant-baseline="central" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">TypeScript · JavaScript · Python · Go · Rust · C · Cross-language edges</text>

<!-- Legend -->
<line x1="68" y1="500" x2="96" y2="500" stroke="#00E5FF" stroke-width="1.2" fill="none" marker-end="url(#arrow-solid)"/>
<text x="102" y="504" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Queries</text>
<line x1="168" y1="500" x2="196" y2="500" stroke="#3A7BFF" stroke-width="0.8" fill="none" marker-end="url(#arrow-dashed)" stroke-dasharray="4 3" opacity="0.7"/>
<text x="202" y="504" style="fill:#8AAAC8;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Graph context returned</text>
<text x="376" y="504" style="fill:#4DD9B0;font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Everything runs locally — no data leaves your machine</text>

</svg>
